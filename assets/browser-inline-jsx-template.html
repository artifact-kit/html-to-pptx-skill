<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HTML to PPTX JSX</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }

      main {
        width: min(760px, calc(100vw - 32px));
      }

      button {
        border: 0;
        border-radius: 8px;
        background: #111827;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 12px 16px;
      }

      [data-ak-slide] {
        position: relative;
        width: 1600px;
        height: 900px;
        background: #ffffff;
      }

      pre {
        overflow: auto;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #ffffff;
        padding: 16px;
      }
    </style>
    <script src="https://unpkg.com/@artifact-kit/pptxgenjs-jsx/dist/pptxgenjs-jsx.browser.iife.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <main data-ak-slide="slide" data-ak-width="1600" data-ak-height="900" data-ak-px-per-in="120">
      <h1 data-ak-measure="title">HTML to PPTX JSX</h1>
      <button id="download" type="button">Download PPTX</button>
      <pre id="status">Ready</pre>
    </main>

    <script type="text/babel" data-type="module" data-presets="typescript,react">
      /** @jsx pptxElement */
      /*
        Minimal browser exporter template.

        Real workflow:
        1. Copy the original HTML into a separate exporter file.
        2. Make every slide/page visible in one vertical container.
        3. Add this CDN + Babel inline JSX export button flow.
        4. Mark slide roots and reusable DOM nodes with data-ak-* attributes.
        5. Measure in the click handler, recreate slides with native components, validate, export.

        For cards, badges, icons, arrows, SVG primitives, heatmaps, and charts, read:
        - references/pptxgenjs-jsx-component-selection.md
        - references/pptxgenjs-jsx-common-props.md
        - references/pptxgenjs-jsx-shape-props.md
        - references/pptxgenjs-jsx-chart-props.md
        - references/native-reconstruction-patterns.md
      */
      const {
        Deck,
        Slide,
        Text,
        measureArtifacts,
        pptxElement,
        readFontPt,
        readPptBox,
        readSlideLayout,
        renderPptx,
        validateDeck,
      } = window.ArtifactKitPptxGenJsx;

      const status = document.querySelector("#status");

      document.querySelector("#download").addEventListener("click", async () => {
        await measureArtifacts({ document });

        const deck = (
          <Deck title="Generated deck" author="artifact-kit" layout={readSlideLayout("slide")}>
            <Slide background={{ color: "FFFFFF" }}>
              <Text {...readPptBox("title")} fontSize={readFontPt("title")} bold color="111827" margin={0}>
                {document.querySelector('[data-ak-measure="title"]').textContent.trim()}
              </Text>
            </Slide>
          </Deck>
        );

        const issues = validateDeck(deck);
        if (issues.some((issue) => issue.level === "error")) {
          status.textContent = JSON.stringify(issues, null, 2);
          return;
        }

        status.textContent = "Rendering...";
        await renderPptx(deck, { fileName: "generated-deck.pptx" });
        status.textContent = "Downloaded generated-deck.pptx";
      });
    </script>
  </body>
</html>
